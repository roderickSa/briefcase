version: '3.7'
services:
  nginx:
    image: nginx:stable-alpine
    container_name: briefcase-nginx
    restart: always
    ports:
      - 8000:80
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - laravel

  mysql:
    image: mysql:5.7
    container_name: briefcase-mysql
    restart: always
    environment:
      MYSQL_DATABASE: briefcase
      MYSQL_USER: roder
      MYSQL_PASSWORD: roder
      MYSQL_ROOT_PASSWORD: roder
    ports:
      - 3306:3306
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - ./mysql:/var/lib/mysql
    networks:
      - laravel

  node:
    image: node:16
    container_name: briefcase-node
    working_dir: /var/www/html
    volumes: 
      - ./src:/var/www/html
    
  php:
    build:
      args:
        user: roder
        uid: 1000
      context: .
      dockerfile: Dockerfile
    container_name: briefcase-php
    volumes:
      - ./src:/var/www/html
    ports:
      - 9000:9000
    networks:
      - laravel

networks:
  laravel: